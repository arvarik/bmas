# ─────────────────────────────────────────────────────────────────────
# bMAS Configuration — Example
# ─────────────────────────────────────────────────────────────────────
# This file defines your entire bMAS deployment.
# Copy to bmas.yaml and customize for your infrastructure.
# Secrets (API keys, passwords) go in .env, NOT here.

project:
  name: "My Swarm"
  description: "Distributed AI swarm"

# ── Control Plane ──────────────────────────────────────────────────
# The machine running Docker Compose (Redis, LiteLLM, Daemon, Dashboard).
control_plane:
  host: "10.0.0.1"                 # Your control plane IP
  ports:
    redis: 6379
    litellm: 4000
    triage: 8001
    daemon: 9000
    dashboard: 9321

# ── Nodes ──────────────────────────────────────────────────────────
# Your agent + inference nodes. Each node runs a Hermes agent
# and optionally a local inference server (llama.cpp / vLLM).
#
# role: The bMAS role assigned to this node.
#   • planner  — Decomposes tasks into sub-task DAGs
#   • executor — Implements sub-tasks (code, research, etc.)
#   • auditor  — Reviews work, resolves conflicts, writes consensus
#
# NOTE: In future versions, roles will be dynamic — any node can
# assume any role per-task, matching the original bMAS paper.
# For now, each node has one fixed role.
nodes:
  - name: "node-1"
    host: "10.0.0.101"             # Agent node IP
    port: 8000
    role: planner
    color: "#a78bfa"               # UI color (optional, has defaults)
    # dashboard_port: 9119         # Hermes Dashboard port (optional, default 9119)
    inference:                     # Optional — omit if no local model
      host: "10.0.0.102"           # Inference server IP (can be same machine)
      port: 8080
      model: "gemma-4-e4b"

  - name: "node-2"
    host: "10.0.0.111"
    port: 8000
    role: executor
    color: "#5eead4"
    inference:
      host: "10.0.0.112"
      port: 8080
      model: "gemma-4-e4b"

  - name: "node-3"
    host: "10.0.0.121"
    port: 8000
    role: auditor
    color: "#fbbf24"
    inference:
      host: "10.0.0.122"
      port: 8080
      model: "gemma-4-e4b"

# ── Triage ─────────────────────────────────────────────────────────
# The local complexity classifier. Runs on the control plane GPU.
# Set enabled: false to skip triage (all tasks route to the
# default_complexity tier).
triage:
  enabled: true
  model: "Qwen/Qwen3-1.7B"
  gpu_memory_utilization: 0.35
  max_model_len: 8192
  default_complexity: medium   # Fallback if triage is disabled/unreachable

# ── Models ─────────────────────────────────────────────────────────
# Define the models available for task execution.
# Each model gets registered in LiteLLM under its key name.
# Provider format follows LiteLLM conventions:
#   gemini, anthropic, openai, openai/<custom> (for vLLM/local)
#
# api_key_env: name of the env var holding the API key (from .env)
models:
  gemini-pro:
    provider: gemini
    model: "gemini-3.1-pro-preview"
    api_key_env: GEMINI_API_KEY
    max_tokens: 8192
    pricing:                           # Optional — enables daemon-side cost_usd
      input_cost_per_token: 1.25e-6    # $/token (input)
      output_cost_per_token: 5.0e-6    # $/token (output)

  gemini-flash:
    provider: gemini
    model: "gemini-3-flash-preview"
    api_key_env: GEMINI_API_KEY
    max_tokens: 4096
    pricing:
      input_cost_per_token: 1.5e-7
      output_cost_per_token: 6.0e-7

  gemini-flash-lite:
    provider: gemini
    model: "gemini-3.1-flash-lite-preview"
    api_key_env: GEMINI_API_KEY
    max_tokens: 2048
    pricing:
      input_cost_per_token: 7.5e-8
      output_cost_per_token: 3.0e-7

  # Example: Adding Anthropic alongside Gemini
  # claude-sonnet:
  #   provider: anthropic
  #   model: "claude-sonnet-4-20250514"
  #   api_key_env: ANTHROPIC_API_KEY
  #   max_tokens: 8192

  # Example: Adding OpenAI
  # gpt-4o:
  #   provider: openai
  #   model: "gpt-4o"
  #   api_key_env: OPENAI_API_KEY
  #   max_tokens: 4096

# ── Routing ────────────────────────────────────────────────────────
# Map each complexity tier to a model defined above.
# "local" is a special value that routes to edge inference
# nodes (round-robin across all nodes with an inference block).
#
# Mix and match providers freely:
#   complex: gemini-pro       ← Gemini for hardest tasks
#   medium: claude-sonnet     ← Claude for medium
#   light: gemini-flash-lite  ← Gemini for cheap tasks
#   simple: local             ← Free, runs on your edge nodes
routing:
  complex: gemini-pro
  medium: gemini-flash
  light: gemini-flash-lite
  simple: local

# ── Monitoring (Optional) ─────────────────────────────────────────
# monitoring:
#   beszel_hub: "http://10.0.0.200:8090"

# ── Coordination (Blackboard Migration) ───────────────────────────
# Controls the coordination paradigm used for multi-agent tasks.
# See docs/proposals/05-control-unit.md §3.
coordination:
  variant: traditional               # traditional | patchboard | stigmergic
  blackboard_v2: true                 # Gates the new board substrate independently of variant
  view_budget_tokens: 12000         # Full-board default; budgeted mode above this
  round_execution: concurrent       # concurrent | sequential (paper-exact reproduction)
  traditional:
    max_rounds: 4
    max_duration_s: 1800
    budget_ceiling_usd: 0.50
    max_concurrent_activations: 3
    experts_per_tier: { simple: 0, light: 1, medium: 2, complex: 3 }
    cleaner_entry_threshold: 12
    stall_rounds: 2
    cu_mode: llm                    # llm | heuristic_first
    coordinator_narration: false
    sole_similarity: auto           # auto | exact | embedding | judge

  # ── Role Registry (doc 12 §2.5) ──────────────────────────────────
  # Maps blackboard roles to Hermes profiles and preferred hosts.
  # preferred_host: null → load-balanced across all nodes.
  # profile: Hermes profile name (in ~/.hermes/profiles/<profile>/).
  # dispatch_port: Port of the api_server.py bridge on the target node.
  role_registry:
    planner:
      preferred_host: "192.168.4.103"     # node-1
      profile: planner
      dispatch_port: 8000
    expert:
      preferred_host: null                # any host (load-balanced)
      profile: expert
      dispatch_port: 8000
    critic:
      preferred_host: "192.168.4.103"     # node-1
      profile: critic
      dispatch_port: 8000
    conflict_resolver:
      preferred_host: "192.168.4.122"     # node-3
      profile: conflict_resolver
      dispatch_port: 8000
    cleaner:
      preferred_host: "192.168.4.103"     # node-1
      profile: cleaner
      dispatch_port: 8000
    decider:
      preferred_host: "192.168.4.112"     # node-2
      profile: decider
      dispatch_port: 8000
    universal:
      preferred_host: null                # any host
      profile: universal
      dispatch_port: 8000

  board:
    max_entry_chars: 8000           # Max body length; larger content → artifacts (doc 17 §6)
    max_title_len: 200              # Max title length for indexing
    salience_weights:               # doc 04 §7 — deterministic importance signal
      confidence: 0.4
      recency: 0.2
      refs_in: 0.3
      penalty: 0.3

# ── Storage (Files & Artifacts) ───────────────────────────────────
# File upload and artifact storage. See docs/proposals/17-files-and-artifacts.md §2.
storage:
  enabled: false
  user_media_dir: "/opt/bmas-data/uploads"
  artifacts_dir: "/opt/output"
  max_upload_mb: 50
  max_task_output_mb: 500
  allowed_upload_types: [pdf, txt, md, csv, json, png, jpg, docx]
  pdf_extraction: pymupdf           # pymupdf | pypdf | off
  extraction_max_chars: 60000
