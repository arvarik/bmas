# bMAS Decider Profile — Hermes config.yaml
# Read-only analysis per doc 12 §2.5: web for verification, file for
# board access. No terminal, browser, or code_exec.

model:
  default: "medium"
  provider: "custom"
  base_url: "http://192.168.4.240:4000/v1"
  api_key: "${LITELLM_MASTER_KEY}"

toolsets:
  web: true           # Web search for verifying solution claims
  browser: false      # No browser automation
  terminal: false     # No terminal access
  code_exec: false    # No code execution
  file: true          # File read for board interaction
  memory: true        # Persistent memory across rounds
  skill_manage: false # No skill authoring
