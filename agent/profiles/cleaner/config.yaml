# bMAS Cleaner Profile — Hermes config.yaml
# Minimal toolset per doc 12 §2.5 note: "give cleaner no external tools."
# File access only — the cleaner works exclusively with board content.

model:
  default: "medium"
  provider: "custom"
  base_url: "http://192.168.4.240:4000/v1"
  api_key: "${LITELLM_MASTER_KEY}"

toolsets:
  web: false          # No web access — works only with board content
  browser: false      # No browser
  terminal: false     # No terminal
  code_exec: false    # No code execution
  file: true          # File read/write for board interaction
  memory: true        # Persistent memory across rounds
  skill_manage: false # No skill authoring
