# bMAS Conflict Resolver Profile — Hermes config.yaml
# Analysis tools only per doc 12 §2.5 note: web + browser for
# verifying competing claims, file for board access.

model:
  default: "medium"
  provider: "custom"
  base_url: "http://192.168.4.240:4000/v1"
  api_key: "${LITELLM_MASTER_KEY}"

toolsets:
  web: true           # Web search for verifying competing claims
  browser: true       # Browser for source verification
  terminal: false     # Conflict resolvers don't need terminal
  code_exec: false    # No code execution
  file: true          # File read for board interaction
  memory: true        # Persistent memory across rounds
  skill_manage: false # No skill authoring
