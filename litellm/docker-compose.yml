services:
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: bmas-litellm
    restart: unless-stopped
    ports:
      - "192.168.4.240:4000:4000"
    volumes:
      - ./config.yaml:/app/config.yaml
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - LITELLM_MASTER_KEY=sk-bmas-master-2026
      - LITELLM_LOG_LEVEL=INFO
    command: --config /app/config.yaml --port 4000 --detailed_debug
    healthcheck:
      test: python -c "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/readiness')"
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2'
    extra_hosts:
      - "host.docker.internal:host-gateway"
