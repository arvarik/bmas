# =============================================================
# LiteLLM Configuration for bMAS
# =============================================================

model_list:
  # ─── Cloud Models (Paid) ────────────────────────────────────
  - model_name: gemini-pro
    litellm_params:
      model: gemini/gemini-3.1-pro-preview
      api_key: os.environ/GEMINI_API_KEY
      max_tokens: 8192
      temperature: 0.3
    model_info:
      description: "Heavy reasoning tasks — planning, synthesis, complex analysis"
      max_input_tokens: 1048576
      max_output_tokens: 65536

  - model_name: gemini-flash
    litellm_params:
      model: gemini/gemini-3-flash-preview
      api_key: os.environ/GEMINI_API_KEY
      max_tokens: 4096
      temperature: 0.5
    model_info:
      description: "Medium tasks — verification, summarization, formatting"
      max_input_tokens: 1048576
      max_output_tokens: 65536

  - model_name: gemini-flash-lite
    litellm_params:
      model: gemini/gemini-3.1-flash-lite-preview
      api_key: os.environ/GEMINI_API_KEY
      max_tokens: 2048
      temperature: 0.5
    model_info:
      description: "Light tasks — simple Q&A, formatting, extraction. Cheaper than Flash, smarter than edge 4B models"
      max_input_tokens: 1048576
      max_output_tokens: 65536

  # ─── Local Triage Model (Free) ─────────────────────────────
  - model_name: triage
    litellm_params:
      model: openai/Qwen/Qwen3-1.7B
      api_base: http://192.168.4.240:8001/v1
      api_key: not-needed
      max_tokens: 1024
      temperature: 0.1
    model_info:
      description: "Complexity triage — Qwen3-4B bfloat16, best-in-class sub-5B instruction following + guided_choice constrained decoding, $0 cost"

  # ─── Edge Inference Nodes (Free) ───────────────────────────
  - model_name: edge-node-1
    litellm_params:
      model: openai/gemma-4-e4b
      api_base: http://192.168.4.102:8080/v1
      api_key: not-needed
      max_tokens: 2048
    model_info:
      description: "Planner node — Gemma 4 E4B on Radeon 780M (RADV reports 760M — Mesa naming bug)"

  - model_name: edge-node-2
    litellm_params:
      model: openai/gemma-4-e4b
      api_base: http://192.168.4.111:8080/v1
      api_key: not-needed
      max_tokens: 2048
    model_info:
      description: "Executor node — Gemma 4 E4B on Radeon 780M (RADV reports 760M — Mesa naming bug)"

  - model_name: edge-node-3
    litellm_params:
      model: openai/gemma-4-e4b
      api_base: http://192.168.4.121:8080/v1
      api_key: not-needed
      max_tokens: 2048
    model_info:
      description: "Auditor node — Gemma 4 E4B on Radeon 780M (RADV reports 760M — Mesa naming bug)"

# ─── Router Settings ─────────────────────────────────────────
router_settings:
  routing_strategy: cost-based-routing
  num_retries: 2
  timeout: 120
  retry_after: 5

  # Model group aliases for the bMAS Daemon
  model_group_alias:
    # The daemon calls "heavy" — LiteLLM routes to Gemini 3.1 Pro
    heavy: gemini-pro
    # The daemon calls "medium" — LiteLLM routes to Gemini 3 Flash
    medium: gemini-flash
    # The daemon calls "light" — LiteLLM routes to Gemini 3.1 Flash Lite (cheap cloud)
    light: gemini-flash-lite
    # The daemon calls "triage" — routes to local Phi-4-mini (free)
    triage: triage

# ─── Spend Tracking ──────────────────────────────────────────
general_settings:
  master_key: sk-bmas-master-2026

litellm_settings:
  # success_callback: ["langfuse"]  # Requires LANGFUSE_PUBLIC_KEY, LANGFUSE_SECRET_KEY, LANGFUSE_HOST env vars
  drop_params: true  # Silently drop unsupported params instead of erroring
