# bMAS Blackboard Redis Configuration

# Network
bind 0.0.0.0
port 6379
protected-mode yes

# Memory management
maxmemory 1gb
maxmemory-policy volatile-lru

# Persistence (RDB snapshots every 60s if ≥100 keys changed)
save 60 100
dbfilename bmas-blackboard.rdb
dir /data

# Pub/Sub (critical for log streaming)
# No special config needed — Pub/Sub is enabled by default
# NOTE: For durable log persistence, consider migrating to Redis Streams
# (XADD/XREAD) instead of Pub/Sub + LPUSH/LTRIM. Streams provide built-in
# persistence, consumer groups, and ID-based replay for late-joining clients.

# Security — set a password for production
requirepass bmas-redis-secret-2026

# Logging
loglevel notice
logfile /data/redis.log
