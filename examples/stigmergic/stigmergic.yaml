# ─────────────────────────────────────────────────────────────────────
# bMAS Configuration — Example (Stigmergic Deployment)
# ─────────────────────────────────────────────────────────────────────
# This file defines your entire bMAS deployment.
# Copy to bmas.yaml and customize for your infrastructure.
# Secrets (API keys, passwords) go in .env, NOT here.

project:
  name: "Stigmergic"
  description: "Distributed AI swarm on Proxmox homelab"

# ── Control Plane ──────────────────────────────────────────────────
# The machine running Docker Compose (Redis, LiteLLM, Daemon, Dashboard).
control_plane:
  host: "192.168.4.240"
  ports:
    redis: 6379
    litellm: 4000
    triage: 8001
    daemon: 9000
    dashboard: 9321

# ── Nodes ──────────────────────────────────────────────────────────
# Your agent + inference nodes. Each node runs a Hermes agent
# and optionally a local inference server (llama.cpp / vLLM).
#
# role: The bMAS role assigned to this node.
#   • planner  — Decomposes tasks into sub-task DAGs
#   • executor — Implements sub-tasks (code, research, etc.)
#   • auditor  — Reviews work, resolves conflicts, writes consensus
#
# NOTE: In future versions, roles will be dynamic — any node can
# assume any role per-task, matching the original bMAS paper.
# For now, each node has one fixed role.
nodes:
  - name: "node-1"
    host: "192.168.4.103"
    port: 8000
    role: planner
    color: "#a78bfa"         # UI color (optional, has defaults)
    inference:               # Optional — omit if no local model
      host: "192.168.4.102"
      port: 8080
      model: "gemma-4-e4b"

  - name: "node-2"
    host: "192.168.4.112"
    port: 8000
    role: executor
    color: "#5eead4"
    inference:
      host: "192.168.4.111"
      port: 8080
      model: "gemma-4-e4b"

  - name: "node-3"
    host: "192.168.4.122"
    port: 8000
    role: auditor
    color: "#fbbf24"
    inference:
      host: "192.168.4.121"
      port: 8080
      model: "gemma-4-e4b"

# ── Triage ─────────────────────────────────────────────────────────
# The local complexity classifier. Runs on the control plane GPU.
# Set enabled: false to skip triage (all tasks route to the
# default_complexity tier).
triage:
  enabled: true
  model: "Qwen/Qwen3-1.7B"
  gpu_memory_utilization: 0.35
  max_model_len: 8192
  default_complexity: medium   # Fallback if triage is disabled/unreachable

# ── Models ─────────────────────────────────────────────────────────
# Define the models available for task execution.
# Each model gets registered in LiteLLM under its key name.
# Provider format follows LiteLLM conventions:
#   gemini, anthropic, openai, openai/<custom> (for vLLM/local)
#
# api_key_env: name of the env var holding the API key (from .env)
models:
  gemini-pro:
    provider: gemini
    model: "gemini-3.1-pro-preview"
    api_key_env: GEMINI_API_KEY
    max_tokens: 65536

  gemini-flash:
    provider: gemini
    model: "gemini-3.5-flash"
    api_key_env: GEMINI_API_KEY
    max_tokens: 65536

  gemini-flash-lite:
    provider: gemini
    model: "gemini-3.1-flash-lite-preview"
    api_key_env: GEMINI_API_KEY
    max_tokens: 65536

  # Example: Adding Anthropic alongside Gemini
  # claude-sonnet:
  #   provider: anthropic
  #   model: "claude-sonnet-4-20250514"
  #   api_key_env: ANTHROPIC_API_KEY
  #   max_tokens: 8192

  # Example: Adding OpenAI
  # gpt-4o:
  #   provider: openai
  #   model: "gpt-4o"
  #   api_key_env: OPENAI_API_KEY
  #   max_tokens: 4096

# ── Routing ────────────────────────────────────────────────────────
# Map each complexity tier to a model defined above.
# "local" is a special value that routes to edge inference
# nodes (round-robin across all nodes with an inference block).
#
# Mix and match providers freely:
#   complex: gemini-pro       ← Gemini for hardest tasks
#   medium: claude-sonnet     ← Claude for medium
#   light: gemini-flash-lite  ← Gemini for cheap tasks
#   simple: local             ← Free, runs on your edge nodes
routing:
  complex: gemini-pro
  medium: gemini-flash
  light: gemini-flash-lite
  simple: local

# ── Monitoring (Optional) ─────────────────────────────────────────
monitoring:
  beszel_hub: "http://192.168.4.229:8090"
