name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # ── Daemon (Python) ────────────────────────────────────────────────
  daemon:
    name: Daemon — tests + type-check + lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: daemon
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio mypy ruff

      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: Type-check (mypy)
        run: mypy src/ --ignore-missing-imports

      - name: Tests (pytest)
        run: pytest tests/ -v --tb=short

  # ── Mission Control (Next.js / TypeScript) ─────────────────────────
  mission-control:
    name: Mission Control — lint + type-check + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mission-control
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: mission-control/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Type-check (tsc)
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
