services:
  vllm-triage:
    image: vllm/vllm-openai:latest
    container_name: bmas-triage
    restart: unless-stopped
    ports:
      - "192.168.4.240:8001:8000"
    volumes:
      - /mnt/nas-models/huggingface:/root/.cache/huggingface
    environment:
      - HF_TOKEN=${HF_TOKEN}
    command: >
      --model Qwen/Qwen3-1.7B
      --host 0.0.0.0
      --port 8000
      --gpu-memory-utilization 0.35
      --max-model-len 8192
      --dtype bfloat16
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          memory: 12G
          cpus: '4'
